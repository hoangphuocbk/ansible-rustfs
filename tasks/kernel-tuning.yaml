---
# OS kernel tuning for RustFS

- name: kernel-tuning | apply sysctl performance settings
  become: true
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: "{{ rustfs_sysctl_file }}"
    sysctl_set: true
    state: present
    reload: true
  loop: "{{ rustfs_sysctl_settings | dict2items }}"

- name: kernel-tuning | enable io_uring (kernel.io_uring_disabled=0)
  become: true
  ansible.posix.sysctl:
    name: kernel.io_uring_disabled
    value: "0"
    sysctl_file: "{{ rustfs_sysctl_file }}"
    sysctl_set: true
    state: present
    reload: true
  when: rustfs_enable_io_uring
  # Older kernels (< 6.6) do not expose this tunable; ignore if absent.
  failed_when: false
